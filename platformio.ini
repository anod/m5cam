; PlatformIO configuration for M5Stack Unit CamS3-5MP
; Can also be built with Arduino IDE (select board: M5UnitCAMS3)

[env:m5unitcams3]
platform = espressif32
board = m5stack-unitcams3
framework = arduino

; USB CDC for serial monitor
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Our patched cam_hal.c in src/ overrides the pre-compiled version
    -Wl,--allow-multiple-definition

; Load credentials from .env file
extra_scripts = pre:load_env.py

; Serial monitor
monitor_speed = 115200
upload_speed = 921600
